name: publish-image

# Builds and pushes the gateway image to GitHub Container Registry (GHCR) on
# every merge to main (and on v* tags / manual dispatch). This mirrors the manual
# `just push` recipe: chain id + WalletConnect project are RUNTIME config, so ONE
# generic image serves every deployment — no build args, no per-deploy variants.
#
# linux/amd64 ONLY with provenance disabled, on purpose: ROFL requires amd64 and a
# clean single-arch manifest (a provenance/attestation index breaks the ROFL pull).
#
# Uses the built-in GITHUB_TOKEN — no extra secrets. NOTE: the first push creates a
# *private* package; make it public in the repo's Packages settings so ROFL (which
# has no registry credentials) can pull it anonymously.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
