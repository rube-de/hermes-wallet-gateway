# Compose for the ROFL app 
#
# Three services on the default internal network:
#   - wallet-gateway   : the ONLY service that publishes a port -> reachable via
#                        the ROFL port proxy as public HTTPS.
#   - hermes-dashboard : stock Hermes image, --insecure on the internal net,
#                        NO published port. Only the gateway can reach it.
#   - hermes-gateway   : stock Hermes messaging/agent runtime (the dashboard
#                        reads its state). NO published port.
#
# Hermes is published on Docker Hub as `nousresearch/hermes-agent` (ONE image,
# run twice with different subcommands). ROFL needs a fully-qualified registry
# host, so it must read `docker.io/nousresearch/hermes-agent`. Every service
# needs a PUBLIC, pullable `image:` — ROFL cannot build from a `build:` block and
# cannot authenticate to private registries. Pin by @sha256 for a reproducible
# TEE bundle (dev uses :latest).

services:
  wallet-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args:
        VITE_WC_PROJECT_ID: ${VITE_WC_PROJECT_ID:-}
        VITE_CHAIN_ID: ${WALLET_CHAIN_ID:-1}
    image: ghcr.io/rube-de/hermes-wallet-gateway:latest
    restart: unless-stopped
    depends_on:
      - hermes-dashboard
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HERMES_TARGET=http://hermes-dashboard:9119
      - WALLET_CHAIN_ID=1
      - WALLET_SESSION_TTL=43200
      - WALLET_STATEMENT=Sign in to the Hermes dashboard.
      # --- the two ROFL secrets (injected as env by the TEE) ---
      - WALLET_WHITELIST=${WALLET_WHITELIST}
      - WALLET_SESSION_SECRET=${WALLET_SESSION_SECRET}
      # Set this to the proxy host AFTER first deploy (oasis rofl machine show),
      # then `oasis rofl update`. Until then SIWE domain-binding can't be final.
      - WALLET_DOMAIN=${WALLET_DOMAIN}

  hermes-dashboard:
    image: docker.io/nousresearch/hermes-agent:latest
    restart: unless-stopped
    # Bind to all interfaces on the internal network with the auth gate OFF
    # (--insecure). Safe ONLY because there is no `ports:` entry -> not publicly
    # reachable; the wallet-gateway is the sole perimeter and enforces auth.
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--insecure", "--no-open", "--skip-build"]
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000

  hermes-gateway:
    image: docker.io/nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["gateway", "run"]
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000

volumes:
  hermes-data:
